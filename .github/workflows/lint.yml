name: Lint

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff on Backend
        run: ruff check backend/
        
      - name: Run Ruff on Frontend
        run: ruff check frontend/
